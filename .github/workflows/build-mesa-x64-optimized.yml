name: Build Mesa Zink for Windows x64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Checkout Mesa source
      run: |
        git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa-src
      shell: pwsh

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja mako PyYAML pywin32
      shell: pwsh

    - name: Setup MSVC for x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Install winflexbison
      run: |
        Invoke-WebRequest -Uri "https://github.com/lexxmark/winflexbison/releases/download/v2.5.25/win_flex_bison-2.5.25.zip" -OutFile "winflexbison.zip"
        Expand-Archive -Path "winflexbison.zip" -DestinationPath "C:\winflexbison"
        echo "C:\winflexbison" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh

    - name: Setup Vulkan-Headers and Loader
      run: |
        # Clone Vulkan-Headers (for compilation headers)
        git clone --depth 1 --branch v1.4.313.0 https://github.com/KhronosGroup/Vulkan-Headers.git C:\Vulkan-Headers

        # Create VULKAN_SDK directory structure
        New-Item -ItemType Directory -Force -Path "C:\VulkanSDK\Include" | Out-Null
        New-Item -ItemType Directory -Force -Path "C:\VulkanSDK\Lib" | Out-Null
        New-Item -ItemType Directory -Force -Path "C:\VulkanSDK\Bin" | Out-Null

        # Copy headers
        Copy-Item -Path "C:\Vulkan-Headers\include\*" -Destination "C:\VulkanSDK\Include\" -Recurse -Force

        # Clone and build Vulkan-Loader (stub library for linking)
        git clone --depth 1 --branch v1.4.313.0 https://github.com/KhronosGroup/Vulkan-Loader.git C:\Vulkan-Loader

        # Build Vulkan-Loader with CMake
        $cmakePath = "C:\Program Files\CMake\bin\cmake.exe"
        & $cmakePath -S C:\Vulkan-Loader -B C:\Vulkan-Loader\build `
          -G "Ninja" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_INSTALL_PREFIX="C:\VulkanSDK" `
          -DVULKAN_HEADERS_INSTALL_DIR="C:\VulkanSDK" `
          -DUSE_MASM=OFF `
          -DBUILD_TESTS=OFF

        & $cmakePath --build C:\Vulkan-Loader\build
        & $cmakePath --install C:\Vulkan-Loader\build

        # Set environment variables
        echo "VULKAN_SDK=C:\VulkanSDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "C:\VulkanSDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

        # Verify
        Write-Host "=== Vulkan SDK Setup ==="
        Get-ChildItem C:\VulkanSDK -Recurse | Where-Object { $_.Name -like "vulkan*" } | Select-Object FullName
      shell: pwsh

    - name: Configure Mesa with Meson
      run: |
        cd mesa-src

        meson setup builddir `
          --prefix=${{ github.workspace }}/install `
          -Dbuildtype=release `
          -Dplatforms=windows `
          "-Dgallium-drivers=zink,softpipe,llvmpipe" `
          "-Dvulkan-drivers=" `
          -Dgles1=enabled `
          -Dgles2=enabled `
          -Dopengl=true `
          -Dgbm=disabled `
          -Degl=disabled `
          -Dglx=disabled `
          -Dllvm=disabled `
          -Dshared-llvm=disabled `
          -Dvalgrind=disabled `
          -Dbuild-tests=false `
          -Db_ndebug=if-release
      shell: pwsh

    - name: Build Mesa
      run: |
        cd mesa-src
        meson compile -C builddir
      shell: pwsh

    - name: Install Mesa
      run: |
        cd mesa-src
        meson install -C builddir
      shell: pwsh

    - name: Package binaries
      run: |
        $timestamp = Get-Date -Format "yyyy-MM-dd"
        $archiveName = "mesa-zink-windows-x64-$timestamp.zip"

        cd install
        Compress-Archive -Path * -DestinationPath ../$archiveName

        echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mesa-zink-windows-x64
        path: ${{ env.ARCHIVE_NAME }}
        retention-days: 90

    - name: Upload binaries as release asset (on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ARCHIVE_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
