name: Build Mesa Zink for Windows x64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Checkout Mesa source
      run: |
        git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa-src
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja mako PyYAML
    
    - name: Setup MSVC for x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64
    
    - name: Install dependencies
      run: |
        # Download and setup winflexbison
        Invoke-WebRequest -Uri "https://github.com/lexxmark/winflexbison/releases/download/v2.5.25/win_flex_bison-2.5.25.zip" -OutFile "winflexbison.zip"
        Expand-Archive -Path "winflexbison.zip" -DestinationPath "C:\winflexbison"
        echo "C:\winflexbison" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
        # Install Vulkan headers
        Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.275.0/windows/VulkanSDK-1.3.275.0-Installer.exe" -OutFile "VulkanSDK.exe"
        Start-Process -FilePath "VulkanSDK.exe" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
        echo "C:\VulkanSDK\1.3.275.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "VULKAN_SDK=C:\VulkanSDK\1.3.275.0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    
    - name: Configure Mesa with Meson
      run: |
        cd mesa-src
        meson setup builddir `
          --prefix=${{ github.workspace }}/install `
          -Dbuildtype=release `
          -Dplatforms=windows `
          "-Dgallium-drivers=zink,softpipe,llvmpipe" `
          "-Dvulkan-drivers=" `
          -Dgles1=enabled `
          -Dgles2=enabled `
          -Dllvm=enabled `
          -Dshared-llvm=disabled `
          -Dvalgrind=disabled `
          -Dbuild-tests=false
      shell: pwsh
    
    - name: Build Mesa
      run: |
        cd mesa-src
        meson compile -C builddir
      shell: pwsh
    
    - name: Install Mesa
      run: |
        cd mesa-src
        meson install -C builddir
      shell: pwsh
    
    - name: Package binaries
      run: |
        cd install
        Compress-Archive -Path * -DestinationPath ../mesa-zink-windows-x64.zip
      shell: pwsh
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mesa-zink-windows-x64
        path: mesa-zink-windows-x64.zip
        retention-days: 30
    
    - name: Upload binaries as release asset (on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: mesa-zink-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
