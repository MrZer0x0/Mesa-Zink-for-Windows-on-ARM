name: Build Mesa GLonD3D12 x64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Mesa source
        run: git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja mako PyYAML pywin32

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install winflexbison
        run: |
          Invoke-WebRequest -Uri "https://github.com/lexxmark/winflexbison/releases/download/v2.5.25/win_flex_bison-2.5.25.zip" -OutFile "winflexbison.zip"
          Expand-Archive -Path "winflexbison.zip" -DestinationPath "C:\winflexbison"
          echo "C:\winflexbison" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Setup DirectX Headers
        run: |
          git clone --depth 1 https://github.com/microsoft/DirectX-Headers.git C:\DirectX-Headers
          New-Item -ItemType Directory -Force -Path "C:\DirectX-Headers\build"
          cmake -S C:\DirectX-Headers -B C:\DirectX-Headers\build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:\DirectX-Headers\install" -DDXHEADERS_BUILD_TEST=OFF -DDXHEADERS_BUILD_GOOGLE_TEST=OFF
          cmake --build C:\DirectX-Headers\build
          cmake --install C:\DirectX-Headers\build
        shell: pwsh

      - name: Clean PATH (remove Strawberry Perl)
        run: |
          $newPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          echo "PATH=$newPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CC=cl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Configure Mesa (GLonD3D12)
        run: |
          cd mesa-src
          meson setup builddir --prefix="${{ github.workspace }}/install" -Dbuildtype=release -Dplatforms=windows "-Dgallium-drivers=d3d12" "-Dvulkan-drivers=" -Dgles1=enabled -Dgles2=enabled -Dllvm=disabled -Dvalgrind=disabled -Dbuild-tests=false -Dwerror=false "-Dc_args=/wd4189" "-Dcpp_args=/wd4189"
        shell: pwsh

      - name: Build Mesa
        run: |
          cd mesa-src
          meson compile -C builddir
        shell: pwsh

      - name: Install Mesa
        run: |
          cd mesa-src
          meson install -C builddir
        shell: pwsh

      - name: Package and upload
        run: |
          cd install
          Write-Host "=== Installed files ==="
          Get-ChildItem -Recurse -File | Select-Object FullName
          Compress-Archive -Path * -DestinationPath ../mesa-gond3d12-windows-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-gond3d12-windows-x64
          path: mesa-gond3d12-windows-x64.zip
          retention-days: 90
