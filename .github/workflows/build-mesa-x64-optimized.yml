name: Build Mesa Zink for Windows x64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Checkout Mesa source
      run: |
        git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa-src
      shell: pwsh

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja mako PyYAML pywin32
      shell: pwsh

    - name: Setup MSVC for x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Install winflexbison
      run: |
        Invoke-WebRequest -Uri "https://github.com/lexxmark/winflexbison/releases/download/v2.5.25/win_flex_bison-2.5.25.zip" -OutFile "winflexbison.zip"
        Expand-Archive -Path "winflexbison.zip" -DestinationPath "C:\winflexbison"
        echo "C:\winflexbison" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh

    - name: Setup Vulkan SDK (Headers + Loader stub)
      run: |
        # ============================================
        # Vulkan SDK setup without LunarG installer
        # Uses GitHub releases (always available)
        # ============================================

        $vulkanVersion = "v1.4.339"
        $vulkanSdkDir = "C:\VulkanSDK"

        # 1. Download Vulkan-Headers from GitHub
        Write-Host "=== Downloading Vulkan-Headers ($vulkanVersion) ==="
        Invoke-WebRequest -Uri "https://github.com/KhronosGroup/Vulkan-Headers/archive/refs/tags/$vulkanVersion.zip" -OutFile "Vulkan-Headers.zip"
        Expand-Archive -Path "Vulkan-Headers.zip" -DestinationPath "C:\temp-vk"
        $headersDir = Get-ChildItem "C:\temp-vk" -Directory | Select-Object -First 1

        # 2. Create VULKAN_SDK directory structure
        New-Item -ItemType Directory -Force -Path "$vulkanSdkDir\Include" | Out-Null
        New-Item -ItemType Directory -Force -Path "$vulkanSdkDir\Lib" | Out-Null
        New-Item -ItemType Directory -Force -Path "$vulkanSdkDir\Bin" | Out-Null

        # Copy headers
        Copy-Item -Path "$($headersDir.FullName)\include\*" -Destination "$vulkanSdkDir\Include\" -Recurse -Force

        # 3. Create vulkan-1.def stub library for linking
        # Zink loads vulkan-1.dll dynamically, but Meson needs a lib to link against
        Write-Host "=== Creating vulkan-1 stub library ==="
        @"
LIBRARY vulkan-1
EXPORTS
    vkGetInstanceProcAddr
    vkCreateInstance
    vkEnumerateInstanceExtensionProperties
    vkEnumerateInstanceLayerProperties
    vkEnumerateInstanceVersion
"@ | Out-File -FilePath "$vulkanSdkDir\vulkan-1.def" -Encoding ascii

        # Generate .lib from .def using MSVC's lib.exe
        lib.exe /def:"$vulkanSdkDir\vulkan-1.def" /out:"$vulkanSdkDir\Lib\vulkan-1.lib" /machine:x64

        # 4. Verify
        Write-Host "=== Vulkan SDK Structure ==="
        Get-ChildItem "$vulkanSdkDir" -Recurse -File | Where-Object { $_.Name -match "vulkan" } | Select-Object FullName
        Write-Host "Headers OK: $(Test-Path "$vulkanSdkDir\Include\vulkan\vulkan.h")"
        Write-Host "Lib OK: $(Test-Path "$vulkanSdkDir\Lib\vulkan-1.lib")"

        # 5. Set environment variables
        echo "VULKAN_SDK=$vulkanSdkDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh

    - name: Configure Mesa with Meson
      run: |
        cd mesa-src

        meson setup builddir `
          --prefix=${{ github.workspace }}/install `
          -Dbuildtype=release `
          -Dplatforms=windows `
          "-Dgallium-drivers=zink,softpipe,llvmpipe" `
          "-Dvulkan-drivers=" `
          -Dgles1=enabled `
          -Dgles2=enabled `
          -Dopengl=true `
          -Dgbm=disabled `
          -Degl=disabled `
          -Dglx=disabled `
          -Dllvm=disabled `
          -Dshared-llvm=disabled `
          -Dvalgrind=disabled `
          -Dbuild-tests=false `
          -Db_ndebug=if-release
      shell: pwsh

    - name: Build Mesa
      run: |
        cd mesa-src
        meson compile -C builddir
      shell: pwsh

    - name: Install Mesa
      run: |
        cd mesa-src
        meson install -C builddir
      shell: pwsh

    - name: Package binaries
      run: |
        $timestamp = Get-Date -Format "yyyy-MM-dd"
        $archiveName = "mesa-zink-windows-x64-$timestamp.zip"

        cd install
        Compress-Archive -Path * -DestinationPath ../$archiveName

        echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mesa-zink-windows-x64
        path: ${{ env.ARCHIVE_NAME }}
        retention-days: 90

    - name: Upload binaries as release asset (on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ARCHIVE_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
