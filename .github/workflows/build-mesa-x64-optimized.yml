name: Build Mesa Zink x64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Mesa source
        run: git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja mako PyYAML

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install winflexbison
        run: |
          Invoke-WebRequest -Uri "https://github.com/lexxmark/winflexbison/releases/download/v2.5.25/win_flex_bison-2.5.25.zip" -OutFile "winflexbison.zip"
          Expand-Archive -Path "winflexbison.zip" -DestinationPath "C:\winflexbison"
          echo "C:\winflexbison" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Setup Vulkan Headers
        run: |
          git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git C:\Vulkan-Headers
          New-Item -ItemType Directory -Force -Path "C:\VulkanSDK\Include"
          New-Item -ItemType Directory -Force -Path "C:\VulkanSDK\Lib"
          Copy-Item -Path "C:\Vulkan-Headers\include\*" -Destination "C:\VulkanSDK\Include\" -Recurse -Force
          $defContent = "LIBRARY vulkan-1`nEXPORTS`n    vkGetInstanceProcAddr`n    vkCreateInstance`n    vkEnumerateInstanceExtensionProperties`n    vkEnumerateInstanceLayerProperties`n    vkEnumerateInstanceVersion`n"
          [System.IO.File]::WriteAllText("C:\VulkanSDK\vulkan-1.def", $defContent)
          lib.exe /def:"C:\VulkanSDK\vulkan-1.def" /out:"C:\VulkanSDK\Lib\vulkan-1.lib" /machine:x64
          echo "VULKAN_SDK=C:\VulkanSDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Vulkan SDK setup complete"
          Write-Host "Headers: $(Test-Path 'C:\VulkanSDK\Include\vulkan\vulkan.h')"
          Write-Host "Lib: $(Test-Path 'C:\VulkanSDK\Lib\vulkan-1.lib')"
        shell: pwsh

      - name: Configure Mesa
        run: |
          cd mesa-src
          meson setup builddir --prefix="${{ github.workspace }}/install" -Dbuildtype=release -Dplatforms=windows "-Dgallium-drivers=zink,softpipe,llvmpipe" "-Dvulkan-drivers=" -Dgles1=enabled -Dgles2=enabled -Dllvm=disabled -Dvalgrind=disabled -Dbuild-tests=false
        shell: pwsh

      - name: Build Mesa
        run: |
          cd mesa-src
          meson compile -C builddir
        shell: pwsh

      - name: Install Mesa
        run: |
          cd mesa-src
          meson install -C builddir
        shell: pwsh

      - name: Package and upload
        run: |
          cd install
          Compress-Archive -Path * -DestinationPath ../mesa-zink-windows-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-zink-windows-x64
          path: mesa-zink-windows-x64.zip
          retention-days: 90
